name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly canary against latest remix@next — catches upstream drift even
    # when no one is actively working on the plugin.
    - cron: '0 12 * * 1'   # Mondays 12:00 UTC
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run verify.ts (always reprime in CI to catch upstream drift)
        run: bun run scripts/verify.ts --reprime
